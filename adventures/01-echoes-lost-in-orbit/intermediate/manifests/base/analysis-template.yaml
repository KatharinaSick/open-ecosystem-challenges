apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: echo-analysis
spec:
  args:
    - name: namespace
    - name: rollout-name
  metrics:
    - name: container-restarts
      interval: 10s
      count: 3
      successCondition: result == 0
      failureLimit: 3
      provider:
        prometheus:
          address: http://prometheus-server.prometheus.svc.cluster.local
          query: |
            sum(increase(kube_pod_container_status_restarts_total{
              namespace="{{args.namespace}}",
              pod=~"{{args.rollout-name}}-.*"
            }[1m])) or vector(0)
    - name: pods-ready
      interval: 10s
      count: 3
      successCondition: result >= 1
      failureLimit: 3
      provider:
        prometheus:
          address: http://prometheus-server.prometheus.svc.cluster.local
          query: |
            sum(kube_pod_status_ready{
              namespace="{{args.namespace}}",
              pod=~"{{args.rollout-name}}-.*",
              condition="true"
            })

