# ============================================================================
# Terraform Validation Workflow
# ============================================================================
# Runs on pull requests to validate Terraform changes.
#
# NOTE: This file is symlinked from:
#   adventures/02-building-cloudhaven/expert/.github/workflows/validate-and-plan.yaml
# You can edit either file - they point to the same location.
# ============================================================================

name: 🔎 Validate & Plan

on:
  pull_request:
    branches: [main]
    paths:
      - 'adventures/02-building-cloudhaven/expert/**/*.tf'
      - 'adventures/02-building-cloudhaven/expert/**/*.tftest.hcl'
      - 'adventures/02-building-cloudhaven/expert/drift-log/*.md'

concurrency:
  group: pr-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  TOFU_VERSION: "1.11.2"
  WORKING_DIR: ${{ github.event.act && '.' || 'adventures/02-building-cloudhaven/expert' }}
  # This is only needed because we're using a mock GCS backend.
  # In production, you'd remove this
  STORAGE_EMULATOR_HOST: ${{ inputs.gcs_endpoint }}

jobs:
  # ----------------------------------------------------------------------------
  # Validate & Plan
  # ----------------------------------------------------------------------------
  validate-and-plan:
    name: 📋 Validate & Plan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # Install tools required by TF-via-PR when running locally with act
      - name: 🔧 Install dependencies (act)
        if: ${{ github.event.act }}
        run: |
          sudo apt-get update
          sudo apt-get install -y jq unzip

          # Create a mock 'gh' script that logs commands instead of calling GitHub API
          # This allows TF-via-PR to run the tofu commands while gracefully skipping PR comments
          # PR comments are written to .act/pr-comments/<timestamp>.md for local review
          mkdir -p .act/pr-comments
          export ACT_COMMENT_FILE=".act/pr-comments/$(date '+%Y-%m-%d_%H-%M-%S').md"
          echo "# PR Comments" > "$ACT_COMMENT_FILE"
          echo "" >> "$ACT_COMMENT_FILE"
          echo "_Generated by act on $(date '+%Y-%m-%d %H:%M:%S')_" >> "$ACT_COMMENT_FILE"
          echo "" >> "$ACT_COMMENT_FILE"
          
          sudo tee /usr/local/bin/gh << GHEOF
          #!/bin/bash
          COMMENT_FILE="$ACT_COMMENT_FILE"
          echo "[act mock] gh \$*" >&2
          
          # Capture PR comments to a markdown file
          if [[ "\$*" == *"pr comment"* || "\$*" == *"issue comment"* ]]; then
            # Extract the comment body (usually passed via --body or -b)
            body=""
            while [[ \$# -gt 0 ]]; do
              case "\$1" in
                --body|-b)
                  body="\$2"
                  shift 2
                  ;;
                --body=*)
                  body="\${1#--body=}"
                  shift
                  ;;
                *)
                  shift
                  ;;
              esac
            done
            
            if [[ -n "\$body" ]]; then
              echo "---" >> "\$COMMENT_FILE"
              echo "" >> "\$COMMENT_FILE"
              echo "\$body" >> "\$COMMENT_FILE"
              echo "" >> "\$COMMENT_FILE"
              echo "[act mock] 📝 Comment saved to \$COMMENT_FILE" >&2
            fi
          fi
          
          # Return empty JSON for API calls that expect output
          if [[ "\$*" == *"api"* ]]; then
            echo "[]"
          fi
          exit 0
          GHEOF
          sudo chmod +x /usr/local/bin/gh

      - name: 🔧 Setup OpenTofu (act)
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: 🔎 Validate & Plan
        uses: OP5dev/TF-via-PR@v13
        with:
          working-directory: ${{ env.WORKING_DIR }}
          command: plan
          arg-lock: false
          tool: tofu
          format: true
          validate: true

