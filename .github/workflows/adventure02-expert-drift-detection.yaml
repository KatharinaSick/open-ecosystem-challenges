# ============================================================================
# Drift Detection Workflow
# ============================================================================
# This workflow automatically detects infrastructure drift and creates a PR
# when drift is found. It can run on a schedule or be triggered manually.
#
# Setup (for this challenge):
# 1. Make sure your Codespace is running and port 30104 is public
# 2. Trigger the workflow and provide your Codespace forwarded URL
#
# Flow:
# 1. Runs `tofu plan -detailed-exitcode` to detect changes
# 2. If drift detected (exit code 2):
#    - Generates a Mermaid dependency graph
#    - Creates a drift log entry
#    - Opens a PR with drift details
# 3. When PR is merged → apply.yaml runs tofu apply
#
# Exit codes for -detailed-exitcode:
# - 0: No changes (no drift)
# - 1: Error
# - 2: Changes detected (drift!)
#
# NOTE: This file is symlinked from:
#   adventures/02-building-cloudhaven/expert/.github/workflows/drift-detection.yaml
# You can edit either file - they point to the same location.
# ============================================================================

name: 🔍 Drift Detection

on:
  # In production, you'd typically run this on a schedule:
  # schedule:
  #   - cron: '0 */n * * *'  # Every n hours

  # For this challenge, we use manual trigger
  workflow_dispatch:
    inputs:
      gcs_endpoint:
        description: 'GCS Backend Endpoint (Codespace forwarded URL for port 30104)'
        required: true
        type: string

# Ensure only one drift detection runs at a time
concurrency:
  group: drift-detection
  cancel-in-progress: false

env:
  WORKING_DIR: adventures/02-building-cloudhaven/expert
  # This is only needed because we're using a mock GCS backend.
  # In production, you'd remove this
  STORAGE_EMULATOR_HOST: ${{ inputs.gcs_endpoint }}

jobs:
  detect-drift:
    name: Detect Infrastructure Drift
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      # ----------------------------------------------------------------------
      # Setup
      # ----------------------------------------------------------------------
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.11.2"

      # ----------------------------------------------------------------------
      # Initialize and Plan
      # ----------------------------------------------------------------------
      - name: 📦 Initialize OpenTofu
        working-directory: ${{ env.WORKING_DIR }}
        run: tofu init

      - name: 🔍 Check for drift
        id: plan
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          set +e  # Don't exit on non-zero
          tofu plan -detailed-exitcode -no-color -out=plan.tfplan 2>&1 | tee plan-output.txt
          EXIT_CODE=$?
          echo "exitcode=$EXIT_CODE" >> $GITHUB_OUTPUT

          if [ $EXIT_CODE -eq 0 ]; then
            echo "status=no-drift" >> $GITHUB_OUTPUT
            echo "✅ No drift detected"
          elif [ $EXIT_CODE -eq 2 ]; then
            echo "status=drift-detected" >> $GITHUB_OUTPUT
            echo "🚨 Drift detected!"
          else
            echo "status=error" >> $GITHUB_OUTPUT
            echo "❌ Error during plan"
            exit 1
          fi

      # ----------------------------------------------------------------------
      # Generate Drift Log Entry (only if drift detected)
      # ----------------------------------------------------------------------
      - name: 📝 Create drift log entry
        if: steps.plan.outputs.status == 'drift-detected'
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          # Create timestamp for the drift log
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          FILENAME="drift-log/$(date -u +"%Y%m%d-%H%M%S").md"

          mkdir -p drift-log

          cat << EOF > "$FILENAME"
          # Drift Detected: $TIMESTAMP

          **Detected by:** GitHub Actions (Workflow Run #${{ github.run_number }})
          **Trigger:** ${{ github.event_name }}
          **Commit:** ${{ github.sha }}

          ## Summary

          Infrastructure drift was detected between the desired state (code) and
          actual state (cloud resources).

          ## Planned Changes

          \`\`\`
          $(grep -A 1000 "OpenTofu will perform the following actions" plan-output.txt | head -50 || echo "See workflow logs for details")
          \`\`\`

          ## Action Taken

          - [ ] PR created for review
          - [ ] Merged and applied (pending)

          ---
          *This entry was automatically generated by the drift detection workflow.*
          EOF

          echo "audit_file=$FILENAME" >> $GITHUB_OUTPUT

      # ----------------------------------------------------------------------
      # Generate Dependency Graph (only if drift detected)
      # ----------------------------------------------------------------------
      - name: 📊 Generate dependency graph
        if: steps.plan.outputs.status == 'drift-detected'
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          # Create PR body with drift details
          cat << 'EOF' > pr-body.md
          # 🚨 Infrastructure Drift Detected

          Drift was detected in the CloudHaven infrastructure.
          Review the changes below and merge this PR to reconcile.

          ## 📋 Planned Changes

          ```
          EOF

          # Extract the plan summary
          grep -A 1000 "OpenTofu will perform the following actions" plan-output.txt | head -50 >> pr-body.md || echo "See workflow logs for details" >> pr-body.md

          cat << 'EOF' >> pr-body.md
          ```

          ## 🗺️ Resource Dependency Graph

          ```mermaid
          EOF

          # Convert tofu graph to Mermaid format
          tofu graph -type=resource -draw-cycles | ./scripts/dot-to-mermaid.sh >> pr-body.md

          cat << 'EOF' >> pr-body.md
          ```

          ## 📝 Drift Log

          This PR includes a drift log entry documenting the detected drift.
          When merged, the `apply.yaml` workflow will run `tofu apply` to reconcile.

          ---
          *Generated automatically by drift detection workflow*
          EOF

      # ----------------------------------------------------------------------
      # Create PR (only if drift detected)
      # ----------------------------------------------------------------------
      - name: 🔀 Create Pull Request
        if: steps.plan.outputs.status == 'drift-detected'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            fix: reconcile infrastructure drift

            Adds drift log entry for drift detected at ${{ github.run_id }}
          title: "🚨 Infrastructure Drift Detected"
          body-path: ${{ env.WORKING_DIR }}/pr-body.md
          branch: fix/infrastructure-drift-${{ github.run_number }}
          delete-branch: true
          add-paths: |
            ${{ env.WORKING_DIR }}/drift-log/*.md
          labels: |
            drift
            infrastructure
            automated

      # ----------------------------------------------------------------------
      # Summary
      # ----------------------------------------------------------------------
      - name: 📝 Job Summary
        run: |
          echo "## Drift Detection Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.plan.outputs.status }}" == "no-drift" ]; then
            echo "✅ **No drift detected** - Infrastructure matches desired state" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.plan.outputs.status }}" == "drift-detected" ]; then
            echo "🚨 **Drift detected** - A PR has been created to reconcile" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
            echo "1. Review the PR" >> $GITHUB_STEP_SUMMARY
            echo "2. Merge to trigger \`tofu apply\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Error** - Check workflow logs for details" >> $GITHUB_STEP_SUMMARY
          fi

