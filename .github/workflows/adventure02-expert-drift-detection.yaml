# ============================================================================
# Drift Detection Workflow
# ============================================================================
# This workflow automatically detects infrastructure drift and creates a PR
# when drift is found. It can run on a schedule or be triggered manually.
#
# Setup (for this challenge):
# 1. Make sure your Codespace is running and port 30104 is public
# 2. Trigger the workflow and provide your Codespace forwarded URL
#
# Flow:
# 1. Runs `tofu plan -detailed-exitcode` to detect changes
# 2. If drift detected (exit code 2):
#    - Generates a Mermaid dependency graph
#    - Creates a drift log entry
#    - Opens a PR with drift details
# 3. When PR is merged → apply.yaml runs tofu apply
#
# Exit codes for -detailed-exitcode:
# - 0: No changes (no drift)
# - 1: Error
# - 2: Changes detected (drift!)
#
# NOTE: This file is symlinked from:
#   adventures/02-building-cloudhaven/expert/.github/workflows/drift-detection.yaml
# You can edit either file - they point to the same location.
# ============================================================================

name: 🔍 Drift Detection - Test?

on:
  # In production, you'd typically run this on a schedule:
  # schedule:
  #   - cron: '0 */n * * *'  # Every n hours

  # For this challenge, we use manual trigger
  workflow_dispatch:
    inputs:
      gcs_endpoint:
        description: 'GCS Backend Endpoint (Codespace forwarded URL for port 30104)'
        required: true
        type: string

# Ensure only one drift detection runs at a time
concurrency:
  group: drift-detection
  cancel-in-progress: false

env:
  WORKING_DIR: adventures/02-building-cloudhaven/expert
  # This is only needed because we're using a mock GCS backend.
  # In production, you'd remove this
  STORAGE_EMULATOR_HOST: ${{ inputs.gcs_endpoint }}

jobs:
  detect-drift:
    name: Detect Infrastructure Drift
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      # ----------------------------------------------------------------------
      # Setup
      # ----------------------------------------------------------------------
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.11.2"

      # ----------------------------------------------------------------------
      # Initialize and Plan
      # ----------------------------------------------------------------------
      - name: 📦 Initialize OpenTofu
        run: tofu init

      - name: 📝 Run OpenTofu Plan
        id: plan
        run: |
          set +e
          tofu plan -detailed-exitcode -out=tfplan

      - name: 🔍 Check if infrastructure has drifted
        id: check-drift
        run: |
          EXIT_CODE=${{ steps.plan.outputs.exitcode }}        
          if [ $EXIT_CODE -eq 2 ]; then
            echo "⚠️ Drift detected!"
            echo "drift=true" >> $GITHUB_OUTPUT
          else
            echo "✅ No drift detected."
            echo "drift=false" >> $GITHUB_OUTPUT
          fi


      # ----------------------------------------------------------------------
      # Generate Drift Log Entry (only if drift detected)
      # ----------------------------------------------------------------------
      - name: 📝 Create drift log entry
        if: steps.check-drift.outputs.drift == 'true'
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
          RUN_NUMBER: ${{ github.run_number }}
          TRIGGER: ${{ github.event_name }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          if [ -n "$ACT" ]; then
            LOG_DIR=".act/drift-log"
          else
            LOG_DIR="drift-log"
          fi

          mkdir -p "$LOG_DIR"
          FILENAME="$LOG_DIR/$(date -u +%Y%m%d-%H%M%S).md"
          PLAN=$(tofu show -no-color tfplan)

          cat > "$FILENAME" <<EOF
          # Drift Detected

          **Run:** [#${RUN_NUMBER}](${RUN_URL})
          **Trigger:** ${TRIGGER}
          **Commit:** [${COMMIT_SHA}](${COMMIT_URL})

          ## Detected Drift

          \`\`\`
          ${PLAN}
          \`\`\`

          ---
          *Auto-generated by drift detection workflow*
          EOF



