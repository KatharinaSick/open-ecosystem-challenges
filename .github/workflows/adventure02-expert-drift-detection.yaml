# Drift Detection Workflow
#
# Detects infrastructure drift and creates a PR to reconcile.

name: 🔍 Drift Detection

on:
  # In production, you'd typically run this on a schedule:
  # schedule:
  #   - cron: '0 */n * * *'  # Every n hours

  # For this challenge, we use a manual trigger
  workflow_dispatch:
    inputs:
      gcs_endpoint:
        description: 'GCS Backend Endpoint (Codespace forwarded URL for port 30104)'
        required: true
        type: string

# Ensure only one drift detection runs at a time
concurrency:
  group: drift-detection
  cancel-in-progress: false

env:
  # This is only needed because we're using a mock GCS backend.
  # In production, you'd remove this
  STORAGE_EMULATOR_HOST: ${{ inputs.gcs_endpoint }}

jobs:
  detect-drift:
    name: Detect Infrastructure Drift
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write
      pull-requests: write

    env:
      WORKING_DIR: ${{ github.event.act && '.' || 'adventures/02-building-cloudhaven/expert' }}

    steps:
      # ----------------------------------------------------------------------
      # Setup
      # ----------------------------------------------------------------------
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.11.2"

      # ----------------------------------------------------------------------
      # Initialize and Plan
      # ----------------------------------------------------------------------
      - name: 📦 Initialize OpenTofu
        working-directory: ${{ env.WORKING_DIR }}
        run: tofu init

      - name: 📝 Run OpenTofu Plan
        id: plan
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          set +e
          tofu plan -detailed-exitcode -out=tfplan
          echo "exitcode=$?" >> $GITHUB_OUTPUT

      - name: 🔍 Check if infrastructure has drifted
        id: check-drift
        run: |
          EXIT_CODE="${{ steps.plan.outputs.exitcode }}"
          if [ "$EXIT_CODE" == "2" ]; then
            echo "⚠️ Drift detected!"
            echo "drift=true" >> $GITHUB_OUTPUT
          elif [ "$EXIT_CODE" == "0" ]; then
            echo "✅ No drift detected."
            echo "drift=false" >> $GITHUB_OUTPUT
          else
            echo "❌ Plan failed with exit code $EXIT_CODE"
            exit 1
          fi


      # ----------------------------------------------------------------------
      # Generate Drift Log Entry (only if drift detected)
      # ----------------------------------------------------------------------
      - name: 📝 Create drift log entry
        if: steps.check-drift.outputs.drift == 'true'
        working-directory: ${{ env.WORKING_DIR }}
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
          RUN_NUMBER: ${{ github.run_number }}
          TRIGGER: ${{ github.event_name }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          if [ -n "$ACT" ]; then
            LOG_DIR=".act/drift-log"
          else
            LOG_DIR="drift-log"
          fi

          mkdir -p "$LOG_DIR"
          FILENAME="$LOG_DIR/$(date -u +%Y%m%d-%H%M%S).md"
          PLAN=$(tofu show -no-color tfplan)

          cat > "$FILENAME" <<EOF
# Drift Detected

**Run:** [#${RUN_NUMBER}](${RUN_URL})
**Trigger:** ${TRIGGER}
**Commit:** [${COMMIT_SHA}](${COMMIT_URL})

## Detected Drift

\`\`\`
${PLAN}
\`\`\`

---
*Auto-generated by drift detection workflow*
EOF

      # ----------------------------------------------------------------------
      # Create PR (if drift detected and not running locally)
      # ----------------------------------------------------------------------
      - name: 🔀 Create Pull Request
        if: ${{ steps.check-drift.outputs.drift == 'true' && !github.event.act }}
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "fix: reconcile infrastructure drift"
          title: "🚨 Infrastructure Drift Detected"
          body: |
            ## 🚨 Infrastructure Drift Detected

            Drift was detected in the CloudHaven infrastructure.
            Review the changes below and merge this PR to reconcile.

            📋 See the drift log entry for details.

            ---
            *Generated automatically by drift detection workflow*
          branch: fix/drift-${{ github.run_number }}
          delete-branch: true
          add-paths: |
            ${{ env.WORKING_DIR }}/drift-log/*.md
          labels: |
            drift
            infrastructure
            automated

      # ----------------------------------------------------------------------
      # Summary (GitHub Actions only)
      # ----------------------------------------------------------------------
      - name: 📝 Job Summary
        if: ${{ !github.event.act }}
        run: |
          echo "## Drift Detection Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check-drift.outputs.drift }}" == "false" ]; then
            echo "✅ **No drift detected** - Infrastructure matches desired state" >> $GITHUB_STEP_SUMMARY
          else
            echo "🚨 **Drift detected** - A PR has been created to reconcile" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
            echo "1. Review the PR" >> $GITHUB_STEP_SUMMARY
            echo "2. Merge to trigger \`tofu apply\`" >> $GITHUB_STEP_SUMMARY
          fi

